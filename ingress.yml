apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bharata-katha-ingress
  namespace: bharata-katha
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
  - http:            # <-- Added the dash right here!
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bharata-katha-app
            port:
              number: 80
